name: Generate Profiles
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    # 添加以下这两行环境变量即可消除 Warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment: 
      name: production
    permissions:
      contents: write
    steps:
      # ==========================================
      # 1. 生成贪吃蛇动画 (速度很快，放在前面)
      # ==========================================
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            github-metrics/github-contribution-grid-snake.svg
            github-metrics/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 提交贪吃蛇动画到当前分支的 github-metrics 文件夹
      - name: Commit snake animation
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update snake animation"
          file_pattern: "github-metrics/*snake*.svg"

      # ==========================================
      # 2. 原有的 lowlighter/metrics 插件
      # ==========================================
      # 基础信息
      - name: base
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/base.svg
          token: ${{ secrets.METRICS }}
          user: gaozheng2001
          template: classic
          config_timezone: Asia/Shenzhen
          base: "header, activity, community, repositories"
          plugin_traffic: yes
          plugin_lines: yes
          plugin_introduction: yes

      # 📓 Featured repositories
      - name: Pinned repositories
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/repositories.pinned.svg
          token: ${{ secrets.METRICS }}
          base: ""
          plugin_repositories: yes
          plugin_repositories_featured: gaozheng2001/rcsmbvd, gaozheng2001/Kinova-Gen3-Gen3lite-Detector

      # 🈷️ Languages activity
      - name: Indepth analysis
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/languages.indepth.svg
          token: ${{ secrets.METRICS }}
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, bytes-size
          plugin_languages_other: true
          plugin_languages_analysis_timeout: 15
          plugin_languages_recent_days: 360

      # ✨ Stargazers   
      - name: Using chartist charts
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/stargazers.chartist.svg
          token: ${{ secrets.METRICS }}
          base: ""
          plugin_stargazers: yes
          plugin_stargazers_charts_type: chartist
          
      # 📅 Isometric commit calendar
      - name: Full-year calendar
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/isocalendar.fullyear.svg
          token: ${{ secrets.METRICS }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # 🌟 Recently starred repositories
      - name: Recently starred
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/stars.svg
          token: ${{ secrets.METRICS }}
          base: ""
          plugin_stars: yes
          plugin_stars_limit: 10
             
      # 🎟️ Follow-up of issues and pull requests 
      - name: Follow-up Indepth analysis
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/followup.indepth.svg
          token: ${{ secrets.METRICS }}
          base: ""
          plugin_followup: yes
          plugin_followup_indepth: yes
          
      # 🎭 Comment reactions
      - name: Comment reactions
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/reactions.svg
          token: ${{ secrets.METRICS }}
          base: ""
          plugin_reactions: yes
          plugin_reactions_limit: 100
          plugin_reactions_details: percentage

      # 🧑‍🤝‍🧑 People    
      - name: Followers
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/people.followers.svg
          token: ${{ secrets.METRICS }}
          base: ""
          plugin_people: yes
          plugin_people_limit: 300
          plugin_people_size: 36
          plugin_people_types: followers, following
          
      # 💬 Discussions
      - name: GitHub Discussions
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/discussions.svg
          token: ${{ secrets.METRICS }}
          base: ""
          plugin_discussions: yes
          plugin_discussions_categories_limit: 8       
   
      # 📆 Commit calendar
      - name: Full history calendar
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/calendar.full.svg
          token: ${{ secrets.METRICS }}
          base: ""
          plugin_calendar: yes
          plugin_calendar_limit: 0

      # 🐍 Python snippet
      - name: Python snippet of the day
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/code.svg
          token: ${{ secrets.METRICS }}
          base: ""
          plugin_code: yes
          plugin_code_days: 360
          plugin_code_languages: python
          plugin_code_load: 400